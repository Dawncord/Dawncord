name: Bug report
description: Report a problem with Dawncord
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!

        ⚠️ **Never paste a real Discord bot token** here. Issues are public.
        For security vulnerabilities, use our [Security Policy](https://github.com/Dawncord/Dawncord/security/policy) instead.
  - type: checkboxes
    attributes:
      label: Preliminary checks
      options:
        - label: I'm using the latest released version of Dawncord
          required: true
        - label: I searched existing issues and didn't find a duplicate
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: A minimal code snippet or steps that reproduce the problem.
      render: java
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: dawncord-version
    attributes:
      label: Dawncord version
      placeholder: "1.4.1"
    validations:
      required: true
  - type: input
    id: jdk-version
    attributes:
      label: JDK version
      placeholder: "25"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      description: Paste any relevant log output. This is automatically formatted, no backticks needed.
      render: shell
